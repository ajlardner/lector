app = "lector-api"
primary_region = "sjc"

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  PORT = "8787"
  RATE_LIMIT_PER_HOUR = "20"
  RATE_LIMIT_PER_DAY = "50"

[[services]]
  protocol = "tcp"
  internal_port = 8787
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[services.tcp_checks]]
  interval = "15s"
  timeout = "2s"

[metrics]
  port = 9091
  path = "/metrics"
